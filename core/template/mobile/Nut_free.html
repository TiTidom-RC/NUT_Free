<div class="eqLogic-widget eqLogic col2" data-eqLogic_id="#id#" data-eqLogic_uid="#uid#" data-version="#version#"
	data-translate-category="#translate_category#" data-category="#category#" style="#style#">
	<style>
		div.eqLogic-widget[data-eqLogic_uid="#uid#"] span.nut-name-flex {
			display: flex;
			justify-content: space-between;
			padding-left: 5px !important;
		}
		div.eqLogic-widget[data-eqLogic_uid="#uid#"] span.nut-name-left {
			display: flex;
			flex: 0 1 auto;
			float: left;
			justify-content: flex-start;
			align-items: center;
		}
		div.eqLogic-widget[data-eqLogic_uid="#uid#"] span.nut-name-left span:not(:empty) {
			padding-right: 3px;
		}
		div.eqLogic-widget[data-eqLogic_uid="#uid#"] span.nut-name-center {
			display: flex;
			flex: 1 1 auto;
			justify-content: center;
			text-align: center;
			overflow: hidden;
			padding-left: 5px;
			padding-right: 5px;
		}
		div.eqLogic-widget[data-eqLogic_uid="#uid#"] span.nut-name-center span {
			justify-content: center;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}
		div.eqLogic-widget[data-eqLogic_uid="#uid#"] span.nut-name-center .widget-name {
			display: flex;
			flex: 1 1 auto;
			padding-left: 6px;
			padding-right: 6px;
		}
		div.eqLogic-widget[data-eqLogic_uid="#uid#"] span.nut-name-right {
			display: flex;
			flex: 0 1 auto;
			float: right;
			justify-content: flex-end;
			align-items: center;
			padding-left: 5px;
		}
		div.eqLogic-widget[data-eqLogic_uid="#uid#"] span.nut-name-right .refresh {
			position: relative;
		}
		div.eqLogic-widget[data-eqLogic_uid="#uid#"] span.nut-name-right i {
			margin-top: unset !important;
			padding-right: 5px;
			color: inherit !important;
		}
		div.eqLogic-widget[data-eqLogic_uid="#uid#"] div.nut-cmds {
			display: block;
			text-align: left;
			padding-left: 5px;
			overflow: auto;
			white-space: nowrap;
			width: 100%;
			box-sizing: border-box;
		}
		div.eqLogic-widget[data-eqLogic_uid="#uid#"] div.nut-cmds .nut-label {
			opacity: 0.6;
			font-style: italic !important;
		}
		div.eqLogic-widget[data-eqLogic_uid="#uid#"] div.nut-cmds .history.cursor {
			font-weight: 600;
		}
	</style>

	<span class="nut-name-flex">
		<span class="nut-name-left">
			<span id="iconUPS_status#id#"></span>
			<span id="iconSSH#id#"></span>
		</span>
		<span class="nut-name-center">
			<span class="widget-name">
				<span>#name_display#</span>
			</span>
		</span>
		<span class="nut-name-right">
			<span data-cmd_id="#refreshid#" class="cmd refresh cursor" title="Rafraîchir">
				<i class="fas fa-sync"></i>
			</span>
		</span>
	</span>

	<script>
		// Icône connexion SSH (mode SSH uniquement)
		if ('#cnx_ssh#' === 'OK') {
			if ('#ssh_op#' === '1') {
				$('#iconSSH#id#').append('<i title="Connexion SSH OK" class="techno techno-tv tooltips" style="font-size:1.1em;color:#00FF00;"></i>');
			} else {
				$('#iconSSH#id#').append('<i title="Sans connexion SSH" class="fa fa-sitemap tooltips" style="font-size:1.1em;color:#00FF00;"></i>');
			}
		} else if ('#cnx_ssh#' === 'KO') {
			$('#iconSSH#id#').append('<i title="Connexion SSH KO" class="fa fa-times tooltips" style="font-size:1.1em;color:#FF0000;"></i>');
		}

		// Icône statut UPS
		var upsStatus = '#ups_status#';
		if (upsStatus.indexOf('OL') > -1) {
			$('#iconUPS_status#id#').append('<i title="#ups_status_label#" class="techno techno-plug2 tooltips" style="font-size:1.1em;color:#00FF00;"></i>');
		} else if (upsStatus.indexOf('DISCHRG') > -1) {
			$('#iconUPS_status#id#').append('<i title="#ups_status_label#" class="techno techno-low2 tooltips" style="font-size:1.1em;color:#FEB95E;"></i>');
		} else {
			$('#iconUPS_status#id#').append('<i title="Pas de Réponse" class="fa fa-times tooltips" style="font-size:1.1em;color:#FF0000;"></i>');
		}
	</script>


	<div class="nut-cmds">
		#cmds_html#
	</div>
</div>
