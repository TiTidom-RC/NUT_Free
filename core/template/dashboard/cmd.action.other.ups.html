<div class="cmd cmd-widget reportModeHidden"
    data-type="action"
    data-subtype="other"
    data-template="ups"
    data-cmd_id="#id#"
    data-cmd_uid="#uid#"
    data-version="#version#"
    data-eqLogic_id="#eqLogic_id#">

    <style>
        .cmd[data-cmd_uid="#uid#"] .cmdName { opacity: 0.6; font-style: italic; vertical-align: middle; }
        .cmd[data-cmd_uid="#uid#"] .execute {
            cursor: pointer;
            margin-left: 4px;
            vertical-align: middle;
        }
    </style>

    <div class="content-xs">
        <span class="cmdName #hide_name#">#name_display#</span>
        <a class="execute" title="#name#"><i class="fas fa-play-circle icon_blue"></i></a>
    </div>

    <script>
        document.querySelector('.cmd[data-cmd_uid="#uid#"] .execute').addEventListener('click', function() {
            jeedom.cmd.execute({ id: '#id#' });
        });
    </script>
</div>
